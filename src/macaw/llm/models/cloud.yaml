# Cloud text-formatting models — OpenAI chat API (or any OpenAI-compatible
# endpoint via a custom Base URL: Groq, Together, a local Ollama, …). `id` is
# the API model name. No local weights; needs an API key (LLM tab → Cloud).
backend: openai-llm
source_url: https://platform.openai.com/docs/guides/text-generation
extra: openai
cloud: true
hardware: Cloud
vram: "—"
size: "—"

models:
  - id: gpt-4o-mini
    label: GPT-4o mini
    speed: very fast
    recommended: true
    rating: 5
    notes: |-
      + Cheapest, fastest OpenAI model — excellent formatting with zero local resources.
      + Nothing to install or download; ideal on light machines.
      − Needs an internet connection and an OpenAI API key; each format is a paid API call.
  - id: gpt-4.1-mini
    label: GPT-4.1 mini
    speed: very fast
    rating: 4
    notes: |-
      + Newer, sharper reasoning than 4o mini for tricky reformatting, still inexpensive.
      + No local footprint.
      − Slightly pricier than 4o mini; needs a connection and an API key.
