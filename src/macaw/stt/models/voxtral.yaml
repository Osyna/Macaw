# Mistral Voxtral (HF Transformers) — isolated venv (extra: voxtral), CUDA GPU.
backend: voxtral
source_url: https://github.com/huggingface/transformers
extra: voxtral
lang_select: true      # Voxtral supports multiple languages
min_specs: "NVIDIA GPU 10 GB · 16 GB RAM"
rec_specs: "NVIDIA GPU 12 GB+ · 16 GB RAM"

models:
