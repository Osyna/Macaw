    speed: fast
    languages: "13"
    streaming: true
    hardware: NVIDIA GPU
    vram: "~9 GB"
    rating: 4
    notes: |-
      + Strong multilingual accuracy across 13 languages, from Mistral.
      + Modern audio-LLM architecture that handles natural, conversational speech well.
      − Large ~6 GB download and high VRAM (~9 GB); slower on first load.
