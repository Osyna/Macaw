# OpenAI cloud transcription (gpt-4o-transcribe family). Runs in-process over
# HTTPS — no local weights. Needs the `openai` SDK in the main env
# (pip install 'macaw[openai]') and an API key: config `openai_api_key` or the
# OPENAI_API_KEY environment variable. `id` is the exact OpenAI model string.
backend: openai
source_url: https://platform.openai.com/docs/guides/speech-to-text
extra: null            # openai SDK installs into the MAIN env, not an isolated venv
lang_select: true      # GPT-4o transcribes many languages
min_specs: "Internet + OpenAI API key"
rec_specs: "Internet + OpenAI API key"

models:
  - id: gpt-4o-transcribe
    label: GPT-4o Transcribe
    size: cloud
    speed: fast
    languages: "99+"
    cloud: true
    hardware: Cloud API
    vram: "—"
    rating: 5
    notes: |-
      + Highest accuracy across 99+ languages with zero local hardware — nothing to download or install.
      + Always the latest model; handles noise and accents extremely well.
      − Needs internet and an OpenAI API key; billed per use; your audio is sent to OpenAI.
  - id: gpt-4o-mini-transcribe
    label: GPT-4o mini Transcribe
    size: cloud
    speed: fast
    languages: "99+"
    cloud: true
    hardware: Cloud API
    vram: "—"
    rating: 4
    notes: |-
      + Strong accuracy at a lower per-minute cost than full GPT-4o.
      + No local hardware — cloud quality on a budget.
      − Needs internet and an API key; your audio leaves your machine.
