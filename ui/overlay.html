<html lang="en">

    <title>Macaw Overlay</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: transparent;
        user-select: none;

    <div id="overlay-root"></div>
    <script type="module">
      import { connect } from "/src/ws.ts";
      import { initOverlay } from "/src/overlay.ts";
      connect().then((engine) => initOverlay(engine));
    </script>
  </body>
</html>
