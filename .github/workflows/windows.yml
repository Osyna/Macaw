name: Windows

# win64 build: PyInstaller onefile engine + Tauri NSIS installer.
# Runs on every version tag (artifacts attached to the GitHub Release) and on
# demand via workflow_dispatch (artifacts downloadable from the run page).

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  win64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5

      - name: Install Python deps
        run: uv sync

      - name: Test suite (Windows)
        run: uv run pytest tests/ -q

      - name: Build engine with PyInstaller
        run: uv run --with pyinstaller pyinstaller packaging/engine/macaw-engine.spec --noconfirm

      - name: Smoke-test the frozen engine
        shell: pwsh
        run: |
          $out = & dist/macaw-engine.exe --help
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - uses: dtolnay/rust-toolchain@stable

      - uses: oven-sh/setup-bun@v2

      - name: Install frontend deps
        run: bun install
        working-directory: ui

      - name: Stage engine sidecar
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force src-tauri/binaries | Out-Null
          Copy-Item dist/macaw-engine.exe src-tauri/binaries/macaw-engine-x86_64-pc-windows-msvc.exe

      - name: Build Tauri app (NSIS)
        run: bunx @tauri-apps/cli@^2 build --bundles nsis

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force out | Out-Null
          Copy-Item src-tauri/target/release/bundle/nsis/*.exe out/
          Copy-Item dist/macaw-engine.exe out/

      - uses: actions/upload-artifact@v4
        with:
          name: macaw-win64
          path: out/*

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
