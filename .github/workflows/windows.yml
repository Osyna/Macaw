name: Windows

# win64 build of the native Slint UI + PyInstaller onefile engine, packaged
# as an NSIS per-user installer and a portable zip. Runs on every version tag
# (artifacts attached to the GitHub Release) and on demand via
# workflow_dispatch (artifacts downloadable from the run page).

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  win64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5

      - name: Install Python deps
        run: uv sync

      - name: Test suite (Windows)
        run: uv run pytest tests/ -q

      - name: Build engine with PyInstaller
        run: uv run --with pyinstaller pyinstaller packaging/engine/macaw-engine.spec --noconfirm

      - name: Smoke-test the frozen engine
        shell: pwsh
        run: |
          $out = & dist/macaw-engine.exe --help
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: macaw-slint

      - name: Build Slint UI (macaw-ui.exe)
        run: cargo build --release --bin macaw-ui
        working-directory: macaw-slint

      - name: Stage bundle layout
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force out/Macaw | Out-Null
          Copy-Item macaw-slint/target/release/macaw-ui.exe out/Macaw/
          Copy-Item dist/macaw-engine.exe out/Macaw/

      - name: Smoke-test the UI exe (headless --stop path)
        shell: pwsh
        run: |
          # --stop with no running instance exits before any window/backend
          # init — proves the exe loads and its DLLs resolve on a bare box.
          # GUI-subsystem exe: it detaches from the console, so run it via
          # Start-Process and read the real exit code.
          $p = Start-Process -FilePath out/Macaw/macaw-ui.exe -ArgumentList "--stop" -Wait -PassThru
          Write-Host "exit code: $($p.ExitCode)"
          if ($p.ExitCode -ne 0) { exit 1 }

      - name: Resolve version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "VERSION=$(grep -m1 '^version = ' pyproject.toml | sed -E 's/version = \"(.*)\"/\1/')" >> "$GITHUB_ENV"
          fi

      - name: Build NSIS installer
        shell: pwsh
        run: |
          $nsis = "makensis"
          if (-not (Get-Command makensis -ErrorAction SilentlyContinue)) {
            choco install nsis -y --no-progress
            $nsis = "C:\Program Files (x86)\NSIS\makensis.exe"
          }
          & $nsis /DVERSION=$env:VERSION /DSRCDIR=..\..\out\Macaw packaging\windows\macaw.nsi
          if ($LASTEXITCODE -ne 0) { exit 1 }
          Move-Item packaging\windows\Macaw_$($env:VERSION)_x64-setup.exe out\

      - name: Zip portable bundle
        shell: pwsh
        run: |
          Compress-Archive -Path out/Macaw -DestinationPath "out/macaw-$($env:VERSION)-win64.zip"
          Copy-Item dist/macaw-engine.exe out/

      - uses: actions/upload-artifact@v4
        with:
          name: macaw-win64
          path: |
            out/*.exe
            out/*.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/*.exe
            out/*.zip
