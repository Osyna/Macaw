name: Windows

# win64 build: PyInstaller onedir zip with uv.exe bundled (isolated backends).
# Runs on every version tag (artifact attached to the GitHub Release) and on
# demand via workflow_dispatch (artifact downloadable from the run page).

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  win64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install app + build tools
        run: |
          python -m pip install --upgrade pip
          pip install . pyinstaller pillow pytest

      - name: Test suite (Windows)
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest tests/ -q

      - name: Build with PyInstaller
        run: pyinstaller packaging/windows/macaw.spec --noconfirm

      - name: Bundle uv (isolated backend installs)
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://github.com/astral-sh/uv/releases/latest/download/uv-x86_64-pc-windows-msvc.zip -OutFile uv.zip
          Expand-Archive uv.zip -DestinationPath uvbin
          Copy-Item uvbin/uv.exe dist/Macaw/

      - name: Smoke-test the frozen build
        shell: pwsh
        run: |
          $out = & dist/Macaw/macaw-cli.exe --version
          Write-Host "macaw-cli --version -> $out"
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Zip
        id: zip
        shell: pwsh
        run: |
          $ver = python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])"
          $zip = "macaw-$ver-win64.zip"
          Compress-Archive -Path dist/Macaw -DestinationPath $zip
          echo "name=$zip" >> $env:GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: macaw-win64
          path: ${{ steps.zip.outputs.name }}

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.zip.outputs.name }}
