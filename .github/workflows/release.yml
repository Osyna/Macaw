name: Release

# Cut a release with `make tag VERSION=X.Y.Z` (bumps pyproject.toml,
# tauri.conf.json and macaw-slint/Cargo.toml, then tags), then
# `git push && git push origin vX.Y.Z`.
#
# Linux ships the native Slint UI (macaw-ui + macaw-overlay, Wayland) with the
# PyInstaller engine as a sidecar, packaged as an AppImage (what install.sh
# fetches) and a plain tarball, plus the wheel/sdist. The Windows installer is
# attached by windows.yml on the same tag.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5

      - name: Verify tag matches pyproject + Cargo versions
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PYPROJECT=$(grep -m1 '^version = ' pyproject.toml | sed -E 's/version = "(.*)"/\1/')
          CARGO=$(grep -m1 '^version = ' macaw-slint/Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          for v in "$PYPROJECT" "$CARGO"; do
            if [ "$VERSION" != "$v" ]; then
              echo "::error::Tag v$VERSION != project version $v. Run 'make tag VERSION=$VERSION'."
              exit 1
            fi
          done
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build wheel and sdist
        run: uv build

      - name: Install Python deps
        run: uv sync

      - name: Install system deps (portaudio for the engine spec, xkbcommon/fontconfig for winit/slint)
        run: sudo apt-get update && sudo apt-get install -y libportaudio2 libxkbcommon-dev libfontconfig1-dev

      - name: Build engine with PyInstaller
        run: uv run --with pyinstaller pyinstaller packaging/engine/macaw-engine.spec --noconfirm

      - name: Smoke-test the frozen engine
        run: dist/macaw-engine --help

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: macaw-slint

      - name: Build Slint UI (macaw-ui + macaw-overlay)
        run: cargo build --release --bins
        working-directory: macaw-slint

      - name: Stage bundle layout
        run: |
          STAGE="macaw-$VERSION-linux-x86_64"
          mkdir -p "$STAGE"
          cp macaw-slint/target/release/macaw-ui "$STAGE/"
          cp macaw-slint/target/release/macaw-overlay "$STAGE/"
          cp dist/macaw-engine "$STAGE/"
          sed 's|__BIN__|macaw-ui|' contrib/macaw.desktop > "$STAGE/macaw.desktop"
          cp contrib/macaw.png "$STAGE/"
          tar czf "dist/$STAGE.tar.gz" "$STAGE"
          echo "STAGE=$STAGE" >> "$GITHUB_ENV"

      - name: Build AppImage
        run: |
          mkdir -p Macaw.AppDir/usr/bin
          cp "$STAGE"/macaw-ui "$STAGE"/macaw-overlay "$STAGE"/macaw-engine Macaw.AppDir/usr/bin/
          cp "$STAGE"/macaw.desktop "$STAGE"/macaw.png Macaw.AppDir/
          printf '#!/bin/sh\nHERE="$(dirname "$(readlink -f "$0")")"\nexec "$HERE/usr/bin/macaw-ui" "$@"\n' > Macaw.AppDir/AppRun
          chmod +x Macaw.AppDir/AppRun
          curl -fsSL -o appimagetool \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run Macaw.AppDir \
            "dist/Macaw-$VERSION-x86_64.AppImage"

      - name: Smoke-test bundle sidecar resolution
        run: |
          # engine must resolve from beside the UI binary (packaged layout)
          "./$STAGE/macaw-engine" --help > /dev/null
          test -x "$STAGE/macaw-ui" && test -x "$STAGE/macaw-overlay"

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.whl *.tar.gz *.AppImage > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/*.AppImage
            dist/SHA256SUMS
